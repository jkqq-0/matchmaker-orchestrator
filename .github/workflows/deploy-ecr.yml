name: Deploy to Amazon ECR

# Triggers when you push a semantic version tag (e.g., v0.4.0)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

# Give GitHub Actions the required permissions to mint a temporary AWS token via OIDC
permissions:
  id-token: write
  contents: read

env:
  # CHANGE THESE to match your AWS account details!
  AWS_REGION: us-east-1
  ECR_REPOSITORY: matchmaker-orchestrator
  ECS_CLUSTER: matchmaker-prod-cluster
  ECS_SERVICE: matchmaker-prod-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Connects GitHub securely to your AWS account without static keys
      # Make sure you set up an OIDC Identity Provider in AWS first!
      # Alternatively, you can replace `role-to-assume` with:
      #   aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #   aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::476114126292:role/GitHubActionsECRRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.ref_name }} # e.g. 'v0.4.0'
        run: |
          # Build the Docker container we created earlier
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          
          # Also tag it as 'latest'
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # Push both tags (the specific version, and the rolling latest version) to AWS
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest



      - name: Force ECS new deployment
        run: |
          echo "Triggering a new deployment for ECS service..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            > /dev/null
          
          echo "✅ Successfully triggered a new deployment for the ECS service!"
          echo "Next time a task is provisioned (or right now, if desired count > 0), it will use the newly pushed image."
